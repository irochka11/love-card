<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            margin: 0;
            transition: background-color 1s;
        }
        h1 { color: #ff4d4d; font-size: 2.5rem; text-align: center; z-index: 10; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; position: relative; z-index: 10; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        #yesBtn { background-color: #ff4d4d; color: white; }
        #noBtn { background-color: #808080; color: white; position: absolute; left: 100px; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1 id="question">Ты меня любишь? 🥺</h1>
    <div class="buttons">
        <button id="yesBtn">Да!</button>
        <button id="noBtn">Нет</button>
    </div>

    <canvas id="heartCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const music = document.getElementById('bgMusic');
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        let animationFrame;
        function startHeartAnimation() {
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const words = [];
            const text = "I love you";
            
            function getHeartPoint(t) {
                return {
                    x: 16 * Math.pow(Math.sin(t), 3),
                    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            // Уменьшили количество элементов со 180 до 75 для читаемости текста
            const totalElements = 75; 
            for (let i = 0; i < totalElements; i++) {
                const t = (i / totalElements) * Math.PI * 2;
                const point = getHeartPoint(t);
                words.push({
                    baseX: point.x * 14, // Немного увеличили масштаб самого сердца
                    baseY: point.y * 14,
                    angle: t
                });
            }

            let scale = 1;
            let growing = true;

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Замедлили скорость пульсации (было шаг 0.008, стало 0.003)
                if (growing) {
                    scale += 0.003;
                    if (scale > 1.08) growing = false;
                } else {
                    scale -= 0.003;
                    if (scale < 0.92) growing = true;
                }

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);

                words.forEach(w => {
                    // Увеличили размер шрифта букв до 16px, чтобы текст читался
                    ctx.font = "bold 16px Arial"; 
                    ctx.fillStyle = "#ff3366";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff3366';
                    
                    const offsetX = Math.sin(Date.now() * 0.0015 + w.angle) * 3;
                    const offsetY = Math.cos(Date.now() * 0.0015 + w.angle) * 3;

                    ctx.fillText(text, (w.baseX + offsetX) * scale, (w.baseY + offsetY) * scale);
                });

                ctx.restore();
                animationFrame = requestAnimationFrame(draw);
            }
            draw();
        }

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            document.querySelector('.buttons').style.display = 'none';
            document.body.style.backgroundColor = '#000000';
            
            startHeartAnimation();
            
            // Исправленный принудительный запуск аудио
            if (music) {
                music.volume = 1.0;
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Ошибка воспроизведения звука:", error);
                    });
                }
            }
        });

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
