<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            transition: background-color 1s;
        }
        h1 { color: #ff4d4d; font-size: 2.5rem; text-align: center; z-index: 10; user-select: none; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; position: relative; z-index: 10; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        #yesBtn { background-color: #ff4d4d; color: white; }
        #noBtn { background-color: #808080; color: white; position: absolute; left: 100px; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1 id="question">Ты меня любишь? 🥺</h1>
    <div class="buttons">
        <button id="yesBtn">Да!</button>
        <button id="noBtn">Нет</button>
    </div>

    <canvas id="heartCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const music = document.getElementById('bgMusic');
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        let animationFrame;
        function startHeartAnimation() {
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const words = [];
            const text = "love you"; 
            
            function isInsideHeart(x, y) {
                const nx = x / 16;
                const ny = -y / 16;
                return Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3) <= 0;
            }

            // Уменьшили шаг сетки (сделали её в разы плотнее), чтобы гарантированно заполнить форму
            // Теперь слова гарантированно найдут свои координаты и построят полноценное сердце
            for (let y = -300; y <= 300; y += 15) {
                for (let x = -300; x <= 300; x += 50) {
                    if (isInsideHeart(x, y)) {
                        words.push({
                            dx: x,
                            dy: y,
                            size: 13
                        });
                    }
                }
            }

            let startTime = Date.now();

            function draw() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let elapsedSeconds = (Date.now() - startTime) / 1000;
                let loopTime = elapsedSeconds % 5; 

                // Плавное аккуратное расширение в такт
                let currentScale = 0.88 + (loopTime / 5) * 0.18;

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);

                words.forEach(w => {
                    ctx.font = `italic bold ${w.size}px 'Trebuchet MS', sans-serif`;
                    ctx.fillStyle = "#ff3366";
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#ff3366';
                    
                    ctx.fillText(text, w.dx * currentScale, w.dy * currentScale);
                });

                ctx.restore();
                animationFrame = requestAnimationFrame(draw);
            }
            draw();

            setInterval(() => {
                if (music) {
                    music.currentTime = 0;
                    music.play().catch(e => console.log(e));
                }
            }, 5000);
        }

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            document.querySelector('.buttons').style.display = 'none';
            document.body.style.backgroundColor = '#000000';
            
            startHeartAnimation();
            
            if (music) {
                music.volume = 1.0;
                music.play().catch(e => console.log("Звук заблокирован:", e));
            }
        });

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
