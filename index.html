<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            transition: background-color 1s;
        }
        h1 { color: #ff4d4d; font-size: 2.5rem; text-align: center; z-index: 10; user-select: none; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; position: relative; z-index: 10; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        #yesBtn { background-color: #ff4d4d; color: white; }
        #noBtn { background-color: #808080; color: white; position: absolute; left: 100px; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1 id="question">Ты меня любишь? 🥺</h1>
    <div class="buttons">
        <button id="yesBtn">Да!</button>
        <button id="noBtn">Нет</button>
    </div>

    <canvas id="heartCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const music = document.getElementById('bgMusic');
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        let animationFrame;
        function startHeartAnimation() {
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const words = [];
            const text = "love you"; 
            
            function getHeartCoords(t) {
                return {
                    x: 16 * Math.pow(Math.sin(t), 3),
                    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            // Увеличили начальный слой до 6, чтобы полностью освободить центр от налипания
            for (let scaleLayer = 6; scaleLayer <= 17; scaleLayer += 1.6) {
                const totalPoints = scaleLayer * 3 + 6;
                for (let i = 0; i < totalPoints; i++) {
                    const t = (i / totalPoints) * Math.PI * 2;
                    const pos = getHeartCoords(t);
                    
                    // Дополнительный жесткий фильтр: убираем точки, слишком близкие к вертикальной оси центра
                    if (Math.abs(pos.x * scaleLayer) < 45 && scaleLayer < 10) {
                        continue; 
                    }

                    words.push({
                        dx: pos.x * scaleLayer * 0.95 + (Math.random() * 6 - 3),
                        dy: pos.y * scaleLayer * 0.95 + (Math.random() * 6 - 3),
                        size: Math.floor(Math.random() * 2) + 14
                    });
                }
            }

            let currentScale = 0.95; // Начинает чуть меньше базового
            const targetScale = 1.05; // Момент, на котором анимация плавно остановится

            function draw() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Медленно доходим до нужной точки и останавливаем расширение
                if (currentScale < targetScale) {
                    currentScale += 0.0008; 
                }

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);

                words.forEach(w => {
                    ctx.font = `italic bold ${w.size}px 'Trebuchet MS', sans-serif`;
                    ctx.fillStyle = "#ff3366";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff3366';
                    
                    ctx.fillText(text, w.dx * currentScale, w.dy * currentScale);
                });

                ctx.restore();
                animationFrame = requestAnimationFrame(draw);
            }
            draw();
        }

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            document.querySelector('.buttons').style.display = 'none';
            document.body.style.backgroundColor = '#000000';
            
            startHeartAnimation();
            
            if (music) {
                music.volume = 1.0;
                music.play().catch(e => console.log("Звук заблокирован:", e));
            }
        });

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
