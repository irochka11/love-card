<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            margin: 0;
            transition: background-color 1s;
        }
        h1 { color: #ff4d4d; font-size: 2.5rem; text-align: center; z-index: 10; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; position: relative; z-index: 10; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        #yesBtn { background-color: #ff4d4d; color: white; }
        #noBtn { background-color: #808080; color: white; position: absolute; left: 100px; }
        
        /* Стили для холста с сердцем */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1 id="question">Ты меня любишь? 🥺</h1>
    <div class="buttons">
        <button id="yesBtn">Да!</button>
        <button id="noBtn">Нет</button>
    </div>

    <canvas id="heartCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" loop></audio>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const music = document.getElementById('bgMusic');
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        // Логика анимации сердца из слов "I love you"
        let animationFrame;
        function startHeartAnimation() {
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const words = [];
            const text = "I love you";
            
            // Математическая функция для генерации точек в форме сердца
            function getHeartPoint(t) {
                return {
                    x: 16 * Math.pow(Math.sin(t), 3),
                    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            // Создаем массив частиц-надписей
            for (let i = 0; i < 180; i++) {
                const t = (i / 180) * Math.PI * 2;
                const point = getHeartPoint(t);
                words.push({
                    baseX: point.x * 12, // Масштаб сердца
                    baseY: point.y * 12,
                    angle: t,
                    size: Math.random() * 4 + 10 // Размер шрифта частиц
                });
            }

            let scale = 1;
            let growing = true;

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Плавный шлейф на темном фоне
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Эффект биения сердца (пульсация масштаба)
                if (growing) {
                    scale += 0.008;
                    if (scale > 1.15) growing = false;
                } else {
                    scale -= 0.008;
                    if (scale < 0.95) growing = true;
                }

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2); // Центрируем сердце

                words.forEach(w => {
                    ctx.font = `bold ${w.size}px Arial`;
                    // Светящийся розово-неоновый цвет
                    ctx.fillStyle = `hsl(${340 + Math.sin(scale) * 20}, 100%, 65%)`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ff3366';
                    
                    // Смещение для красивого хаотичного эффекта
                    const offsetX = Math.sin(Date.now() * 0.003 + w.angle) * 5;
                    const offsetY = Math.cos(Date.now() * 0.003 + w.angle) * 5;

                    ctx.fillText(text, (w.baseX + offsetX) * scale, (w.baseY + offsetY) * scale);
                });

                ctx.restore();
                animationFrame = requestAnimationFrame(draw);
            }
            draw();
        }

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            document.querySelector('.buttons').style.display = 'none';
            document.body.style.backgroundColor = '#000000'; // Меняем фон на черный
            
            startHeartAnimation();
            
            music.play().catch(error => {
                console.log("Браузер заблокировал звук:", error);
            });
        });

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
